syntax = "proto3";

package ironfile.v1;

service FileBrowser {
  rpc OpenPath(OpenPathRequest) returns (BrowseResponse);
  rpc StreamLogs(LogStreamRequest) returns (stream LogEntry);
}

message LogStreamRequest {}

message LogEntry {
  string message = 1;
}

message OpenPathRequest {
  string path = 1;
}

message FileEntry {
  string path = 1;
  string name = 2;
  bool is_directory = 3;
}

message Directory {
  repeated FileEntry entries = 1;
}

message FileContent {
  string content = 1;
}

message BrowserError {
  string message = 1;
}

message BrowseResponse {
  string path = 1;
  oneof payload {
    Directory directory = 2;
    FileContent file = 3;
    BrowserError error = 4;
  }
}
