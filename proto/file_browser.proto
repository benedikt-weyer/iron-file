syntax = "proto3";

package ironfile.v1;

service FileBrowser {
  rpc OpenPath(OpenPathRequest) returns (BrowseResponse);
  rpc ListDirectory(ListDirectoryRequest) returns (stream FileEntry);
  rpc CreateThumbnail(ThumbnailRequest) returns (ThumbnailResponse);
  rpc CopyEntries(FileCommandRequest) returns (FileCommandResponse);
  rpc DeleteEntries(DeleteEntriesRequest) returns (FileCommandResponse);
  rpc CreateSymlinks(FileCommandRequest) returns (FileCommandResponse);
  rpc StreamLogs(LogStreamRequest) returns (stream LogEntry);
}

message LogStreamRequest {}

message LogEntry {
  string message = 1;
}

message OpenPathRequest {
  string path = 1;
  string thumbnail_directory = 2;
}

message FileEntry {
  string path = 1;
  string name = 2;
  bool is_directory = 3;
  string thumbnail_path = 4;
  bool is_symlink = 5;
}

message ThumbnailRequest {
  string path = 1;
  string thumbnail_directory = 2;
}

message ThumbnailResponse {
  string path = 1;
  string thumbnail_path = 2;
}

message FileCommandRequest {
  repeated string sources = 1;
  string destination = 2;
}

message FileCommandResponse {
  repeated string copied_paths = 1;
}

message DeleteEntriesRequest {
  repeated string paths = 1;
}

message ListDirectoryRequest {
  string path = 1;
}

message Directory {
  repeated FileEntry entries = 1;
}

message FileContent {
  string content = 1;
}

message BrowserError {
  string message = 1;
}

message BrowseResponse {
  string path = 1;
  oneof payload {
    Directory directory = 2;
    FileContent file = 3;
    BrowserError error = 4;
  }
}
